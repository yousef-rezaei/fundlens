# Language-agnostic hygiene hooks. Tool-specific hooks (ruff/black/mypy,
# eslint/prettier) are added in Steps 2 and 3.
default_language_version:
  python: python3.13

# Hygiene hooks for all files; Python quality hooks run via Poetry so the
# versions always match backend/poetry.lock. Frontend hooks are added in Step 3.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: ruff
        name: ruff (backend)
        entry: poetry --project backend run ruff check --fix
        language: system
        types: [python]
        files: ^backend/
      - id: black
        name: black (backend)
        entry: poetry --project backend run black
        language: system
        types: [python]
        files: ^backend/
